replicaCount: 1

image:
  repository: prom/alertmanager
  tag: "v0.32.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9093

config:
  configMapName: alertmanager-config
  mountPath: /etc/alertmanager

# Discord webhook URL = Secret (git 평문 금지). webhook_url_file 로 마운트.
discordSecret:
  name: alertmanager-discord
  key: webhook-url
  mountPath: /etc/alertmanager/secrets

route:
  groupWait: 30s
  groupInterval: 5m
  repeatInterval: 4h
  watchdogRepeatInterval: 24h

resources:
  requests:
    cpu: "20m"
    memory: "32Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
