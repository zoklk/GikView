name: Backend CI/CD

on:
  workflow_run:
    workflows: ["web-CI"]
    types: [completed]
    branches: [dev, main]
  workflow_dispatch:        # 수동 트리거 (Actions 탭 Run workflow). 실행한 브랜치로 환경 결정.

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check for backend changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — forcing deploy."
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            if git diff --name-only "$BASE" HEAD | grep -q '^web/backend/'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No web/backend/ changes — skipping deploy."
            fi
          fi

      - name: Set environment config
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-backend-ci-prod" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-backend-prod" >> $GITHUB_ENV
            echo "ENV_SUFFIX=prod" >> $GITHUB_ENV
          else
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-backend-ci-dev" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-backend-dev" >> $GITHUB_ENV
            echo "ENV_SUFFIX=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Build Lambda zip
        if: steps.changes.outputs.changed == 'true'
        working-directory: web/backend
        run: |
          mkdir -p build
          pip install \
            --platform manylinux2014_aarch64 \
            --target ./build \
            --implementation cp \
            --python-version 3.14 \
            --only-binary=:all: \
            -r requirements.txt --quiet
          cp *.py ./build/
          cd build && zip -r ../lambda.zip . && cd ..

      - name: Upload to S3
        if: steps.changes.outputs.changed == 'true'
        working-directory: web/backend
        run: |
          aws s3 cp lambda.zip s3://${{ env.S3_BUCKET }}/lambda.zip

      - name: Update Lambda functions
        if: steps.changes.outputs.changed == 'true'
        run: |
          for func in handler broadcast authorizer; do
            aws lambda update-function-code \
              --function-name gikview-ws-${func}-${{ env.ENV_SUFFIX }} \
              --s3-bucket ${{ env.S3_BUCKET }} \
              --s3-key lambda.zip
          done