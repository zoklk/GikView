name: Frontend CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'web/frontend/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'web/frontend/**'

env:
  TRIVY_VERSION: '0.71.0'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 전체 git history 스캔

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-lint:
    name: Frontend Lint & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        working-directory: web/frontend
        run: npm ci

      - name: ESLint
        working-directory: web/frontend
        run: npm run lint

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Trivy (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --skip-dirs web/frontend/node_modules \
            web/frontend/
