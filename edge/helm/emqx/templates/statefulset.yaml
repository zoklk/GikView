apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emqx.labels" . | nindent 4 }}
  annotations:
    secret.reloader.stakater.com/reload: {{ .Values.tls.secretName | quote }}
    configmap.reloader.stakater.com/reload: {{ .Values.acl.configMapName | quote }}
spec:
  serviceName: {{ .Chart.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  # 무중단 롤: 한 파드씩(RollingUpdate) + Ready 후 minReadySeconds 만큼 더 대기해
  # 클러스터 정착·클라이언트 재연결 안정화 후 다음 파드 진행. 동시 재시작으로 인한
  # 재연결 SUBSCRIBE 유실(소비자 구독 끊김) 방지.
  updateStrategy:
    type: RollingUpdate
  minReadySeconds: {{ .Values.minReadySeconds | default 30 }}
  selector:
    matchLabels:
      {{- include "emqx.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "emqx.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "emqx.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: emqx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: mqtts
              containerPort: {{ .Values.service.ports.mqtts }}
              protocol: TCP
            - name: dashboard
              containerPort: {{ .Values.service.ports.dashboard }}
              protocol: TCP
            - name: ekka
              containerPort: {{ .Values.service.ports.ekka }}
              protocol: TCP
          # tcpSocket(mqtts) 는 포트만 열리면 Ready 라, 클러스터 미형성 상태에서 롤이 진행돼
          # 재연결 클라이언트의 SUBSCRIBE 가 유실됨(소비자 구독 끊김 → 적재 조용히 멎음).
          # 노드가 실제 running 일 때만 Ready 판정하도록 emqx ctl status(기동 시 exit 0)로 게이팅.
          readinessProbe:
            exec:
              command: ["emqx", "ctl", "status"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- range $key, $val := .Values.emqxConfig }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
            - name: emqx-log
              mountPath: /opt/emqx/log
            - name: tmp
              mountPath: /tmp
            - name: emqx-tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            - name: emqx-acl
              mountPath: {{ .Values.acl.mountPath }}
              readOnly: true
      volumes:
        - name: emqx-data
          emptyDir: {}
        - name: emqx-log
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: emqx-tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        - name: emqx-acl
          configMap:
            name: {{ .Values.acl.configMapName }}
