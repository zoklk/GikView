name: web-CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'web/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'web/**'

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 git history 스캔

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Backend Lint & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install tools
        run: |
          pip install \
            ruff \
            mypy \
            boto3-stubs[dynamodb,apigatewaymanagementapi] \
            types-PyJWT

      - name: Ruff lint
        run: ruff check web/backend/

      - name: Ruff format check
        run: ruff format --check web/backend/

      - name: mypy
        run: mypy web/backend/ --ignore-missing-imports

      - name: Trivy (dependencies)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: web/backend/
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

  frontend-lint:
    name: Frontend Lint & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        working-directory: web/frontend
        run: npm ci

      - name: ESLint
        working-directory: web/frontend
        run: npm run lint

      - name: Trivy (dependencies)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: web/frontend/
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'