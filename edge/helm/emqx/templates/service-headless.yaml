apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-headless
  labels:
    {{- include "emqx.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "emqx.selectorLabels" . | nindent 4 }}
  ports:
    - name: mqtt
      port: {{ .Values.service.ports.mqtt }}
      protocol: TCP
    - name: mqtts
      port: {{ .Values.service.ports.mqtts }}
      protocol: TCP
    - name: dashboard
      port: {{ .Values.service.ports.dashboard }}
      protocol: TCP
    - name: ekka
      port: {{ .Values.service.ports.ekka }}
      protocol: TCP
