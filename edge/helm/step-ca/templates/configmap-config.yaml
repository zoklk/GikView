{{- /*
step-ca-config ConfigMap — holds ca.json, the *static* config. The X5C device provisioners carry
options.x509.templateData.allowedCNs == [] here; the merge initContainer fills it from the
step-ca-whitelist ConfigMap at boot, and the static x5cLeafTemplate's {{ "{{ fail }}" }} guard reads
it to enforce the device-CN whitelist (decision c — OSS step-ca has no per-provisioner policy).
Named "step-ca-config" to match what the step-certificates subchart mounts as the `config` volume
({fullname}-config, fullname=step-ca via nameOverride). In existingSecrets mode the subchart does NOT
render this ConfigMap, so the umbrella does. Env-specific bits (X5C roots, admin JWK, dnsNames) come
from .Values.caJson (values-<env>.yaml). ca.json keys: root/crt/key point at the operator-pre-created
step-ca-certs (RO /home/step/certs) and step-ca-secrets (RO /home/step/secrets) Secrets.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: step-ca-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "step-ca.labels" . | nindent 4 }}
data:
  ca.json: |
    {
      "root": "/home/step/certs/root_ca.crt",
      "crt": "/home/step/certs/intermediate_ca.crt",
      "key": "/home/step/secrets/intermediate_ca_key",
      "address": ":9000",
      "dnsNames": {{ toJson .Values.caJson.dnsNames }},
      "logger": { "format": "json" },
      "db": { "type": "badgerv2", "dataSource": "/home/step/db" },
      "authority": {
        "claims": {{ toJson .Values.caJson.claims }},
        "provisioners": [
          {
            "type": "X5C",
            "name": "device-bootstrap",
            "roots": {{ .Values.caJson.deviceBootstrapRoots | quote }},
            "claims": { "defaultTLSCertDuration": "2160h", "disableRenewal": true },
            "options": { "x509": { "templateData": { "allowedCNs": [] }, "template": {{ .Values.caJson.x5cLeafTemplate | toJson }} } }
          },
          {
            "type": "X5C",
            "name": "device-renewal",
            "roots": {{ .Values.caJson.deviceRenewalRoots | quote }},
            "claims": { "defaultTLSCertDuration": "2160h", "allowRenewalAfterExpiry": false },
            "options": { "x509": { "templateData": { "allowedCNs": [] }, "template": {{ .Values.caJson.x5cLeafTemplate | toJson }} } }
          },
          {
            "type": "JWK",
            "name": "admin",
            "key": {{ toJson .Values.caJson.adminJwk.key }},
            "encryptedKey": {{ .Values.caJson.adminJwk.encryptedKey | quote }}
          }
        ]
      }
    }
