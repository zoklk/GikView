image:
  repository: ghcr.io/zoklk/mapping-generator
  tag: edge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: ""

schedule: "*/15 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
startingDeadlineSeconds: 120
backoffLimit: 4

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}

# telegraf-lookup CSV를 복제할 추가 namespace. telegraf-freshness(monitoring)가
# expected-room 메트릭 소스로 mount — CM은 namespace-local이라 복제 필요. "" = 비활성.
lookupExtraNamespace: monitoring

# device_id -> room_id. room_id convention: room_{a|b}_{floor}_{idx}.
deviceRoomMapping: {}
