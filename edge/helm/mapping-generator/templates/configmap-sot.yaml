{{- /*
Single source of truth, rendered from .Values.deviceRoomMapping (git-managed).
mapping-generator only READS this — the three derived ConfigMaps (emqx-acl,
step-ca-whitelist, telegraf-lookup) are written by the Job/CronJob, not here.
Helm iterates map keys in sorted order, so the rendered csv is deterministic.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: device-room-mapping
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mapping-generator.labels" . | nindent 4 }}
data:
  mapping.csv: |
    {{- range $device, $room := .Values.deviceRoomMapping }}
    {{ $device }},{{ $room }}
    {{- end }}
