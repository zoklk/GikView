{{- /* Device-facing NodePort. Local externalTrafficPolicy preserves device source IP. */ -}}
apiVersion: v1
kind: Service
metadata:
  name: step-ca-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "step-ca.labels" . | nindent 4 }}
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    {{- include "step-ca.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 9000
      targetPort: 9000
      nodePort: {{ .Values.nodePort.number }}
      protocol: TCP
