name: web-CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'web/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'web/**'

env:
  TRIVY_VERSION: '0.71.0'

permissions:
  contents: read

jobs:
  detect:
    name: Detect components
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f web/frontend/package.json ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "web/frontend/package.json 없음 — frontend-lint 스킵."
          fi

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 git history 스캔

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Backend Lint & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install tools
        run: |
          pip install \
            ruff \
            mypy \
            boto3-stubs[dynamodb,apigatewaymanagementapi] \
            types-PyJWT

      - name: Ruff lint
        run: ruff check web/backend/

      - name: Ruff format check
        run: ruff format --check web/backend/

      - name: mypy
        run: mypy web/backend/ --ignore-missing-imports

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Trivy (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            web/backend/

  frontend-lint:
    name: Frontend Lint & Scan
    # frontend 코드가 web/frontend/ 로 이동되기 전엔 스킵 (현재 web/ 루트에 존재).
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        working-directory: web/frontend
        run: npm ci

      - name: ESLint
        working-directory: web/frontend
        run: npm run lint

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Trivy (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --skip-dirs web/frontend/node_modules \
            web/frontend/