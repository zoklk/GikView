apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "telegraf-freshness.labels" . | nindent 4 }}
data:
  telegraf.conf: |
    [agent]
      interval = "{{ .Values.config.queryInterval }}"
      flush_interval = "{{ .Values.config.queryInterval }}"
      omit_hostname = true

    # 자체 계측 — http 입력(InfluxDB 질의) 성공/실패를 internal_gather_errors 로 노출. smoke 가 검증.
    [[inputs.internal]]

    # InfluxDB 3 Core SQL: 방별 마지막 데이터 시각(epoch seconds).
    [[inputs.http]]
      urls    = ["${INFLUXDB_URL}/api/v3/query_sql"]
      method  = "POST"
      headers = {Authorization = "Bearer ${INFLUXDB_TOKEN}", Content-Type = "application/json"}
      # WHERE time 범위로 스캔 parquet 수를 묶음 — InfluxDB 3 Core 파일 한도(기본 432) 초과 500 방지. Core 는 compaction 없어 파일이 무한 누적되므로 풀스캔 금지.
      body    = '''{"db":"{{ .Values.influxdb.database }}","q":"SELECT room_id, to_unixtime(max(time)) AS last_seen_seconds FROM occupancy WHERE time > now() - interval '{{ .Values.config.freshnessWindow }}' GROUP BY room_id","format":"json"}'''
      data_format = "json_v2"

      [[inputs.http.json_v2]]
        measurement_name = "gikview_sensor"
        [[inputs.http.json_v2.object]]
          path = "@this"
          tags = ["room_id"]

    # SoT 기대 방 목록 — mapping-generator 가 이 NS 로 복제한 lookup CSV. 매 interval 재읽기라
    # CM 갱신이 kubelet sync(~1m)로 자동 반영. SensorNoData rule 이 이 메트릭과 join 해
    # "시리즈 부재(6h 창 이탈) = 정상" 오판(false RESOLVED)을 차단.
    [[inputs.file]]
      files = ["{{ .Values.lookup.mountPath }}/{{ .Values.lookup.sourceKey }}"]
      name_override = "gikview_room"
      data_format = "csv"
      csv_header_row_count = 1
      csv_tag_columns = ["room_id"]

    # CSV 에 숫자 컬럼이 없어 expected=1 필드 주입 — prometheus_client 는 숫자 필드만 노출
    # (device_id 문자열 필드는 자동 탈락). 노출명: gikview_room_expected{room_id}.
    [[processors.defaults]]
      namepass = ["gikview_room"]
      [processors.defaults.fields]
        expected = 1

    # gikview_sensor_last_seen_seconds{room_id} gauge + internal_* 노출. Prometheus 가 스크랩.
    [[outputs.prometheus_client]]
      listen         = ":{{ .Values.service.port }}"
      metric_version = 2
