name: Frontend CI/CD

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'web/frontend/**'

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set environment config
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-frontend-ci-prod" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-frontend-prod" >> $GITHUB_ENV
            echo "CLOUDFRONT_ID=ELY9DHUYAKNHJ" >> $GITHUB_ENV
            echo "VITE_WS_URL=wss://7t5yk4e8vf.execute-api.ap-northeast-2.amazonaws.com/prod/" >> $GITHUB_ENV
          else
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-frontend-ci-dev" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-frontend-dev" >> $GITHUB_ENV
            echo "VITE_WS_URL=wss://7t5yk4e8vf.execute-api.ap-northeast-2.amazonaws.com/dev/" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        working-directory: web/frontend
        run: npm ci

      - name: Build
        working-directory: web/frontend
        env:
          VITE_WS_URL: ${{ env.VITE_WS_URL }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync web/frontend/dist/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        if: github.ref == 'refs/heads/main'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"