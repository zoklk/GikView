apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.scrapeInterval }}
      evaluation_interval: {{ .Values.scrapeInterval }}

    rule_files:
      - {{ .Values.rules.mountPath }}/*.yaml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.{{ .Release.Namespace }}.svc:9093"]

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:{{ .Values.service.port }}"]

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["{{ .Release.Namespace }}"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: node-exporter
            action: keep

      - job_name: influxdb
        metrics_path: /metrics
        # InfluxDB 3 Core /metrics 는 admin token 필요(무인증 시 401). 토큰은 secret 파일로 마운트.
        authorization:
          type: Bearer
          credentials_file: {{ .Values.influxdbTokenSecret.mountPath }}/token
        static_configs:
          - targets: ["influxdb.gikview.svc:8181"]

      # emqx 2-node StatefulSet — ClusterIP LB(emqx.svc)로 긁으면 매 scrape 마다 다른 노드가
      # 응답해 노드별 카운터(authorization_deny 등)가 1↔0 으로 튀고 increase()/rate() 가 오발.
      # headless endpoints 로 pod 별 개별 스크랩 → instance 별 안정 monotonic. 합산은 쿼리에서.
      - job_name: emqx
        metrics_path: /api/v5/prometheus/stats
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["gikview"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: emqx-headless
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: dashboard
            action: keep

      # cert-manager controller 는 metrics Service 가 없고 pod(:9402 http-metrics)만 노출 → pod SD 로 발견.
      - job_name: cert-manager
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["gikview"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: cert-manager
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: http-metrics
            action: keep

      - job_name: telegraf-freshness
        static_configs:
          - targets: ["telegraf-freshness.{{ .Release.Namespace }}.svc:9273"]

      # edge-gateway 2 replica(shared-subscription) — pod 별 PutItem/STS 카운터 독립.
      # ClusterIP LB 로 긁으면 노드 값이 튀어 increase() 오발 → pod SD 개별 스크랩. 합산은 쿼리/alert.
      - job_name: edge-gateway
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["gikview"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: edge-gateway
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
            action: keep
      {{- if .Values.hubble.enabled }}

      # Hubble(Cilium) 네트워크 flow 메트릭. cilium-agent 가 kube-system 의 headless
      # svc hubble-metrics(:9965)로 평문 노출. 전 노드 agent → endpoints SD 로 개별 스크랩.
      # 선행: cilium hubble.metrics.enabled (양 클러스터). 상세 context/knowledge/hubble.md.
      - job_name: hubble
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["kube-system"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: hubble-metrics
            action: keep
      {{- end }}
      {{- if .Values.etcd.target }}

      - job_name: etcd
        scheme: http
        static_configs:
          - targets: ["{{ .Values.etcd.target }}"]
      {{- end }}
