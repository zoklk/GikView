name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types: [completed]
    branches: [dev, main]
  workflow_dispatch:        # 수동 트리거 (Actions 탭 Run workflow). 실행한 브랜치로 환경 결정.

env:
  AWS_REGION: ap-northeast-2

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set environment config
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-frontend-ci-prod" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-frontend-prod" >> $GITHUB_ENV
            echo "CLOUDFRONT_ID=ELY9DHUYAKNHJ" >> $GITHUB_ENV
            echo "VITE_WS_URL=wss://7t5yk4e8vf.execute-api.ap-northeast-2.amazonaws.com/prod/" >> $GITHUB_ENV
            echo "VITE_CLIENT_ID=814a597e-ee9f-46d1-a28e-89f9b85bb961" >> $GITHUB_ENV
            echo "VITE_REDIRECT_URI=https://gikview.org/" >> $GITHUB_ENV
          else
            echo "ROLE_ARN=arn:aws:iam::585192672325:role/gikview-frontend-ci-dev" >> $GITHUB_ENV
            echo "S3_BUCKET=gikview-frontend-dev" >> $GITHUB_ENV
            echo "VITE_WS_URL=wss://7t5yk4e8vf.execute-api.ap-northeast-2.amazonaws.com/dev/" >> $GITHUB_ENV
            echo "VITE_CLIENT_ID=814a597e-ee9f-46d1-a28e-89f9b85bb961" >> $GITHUB_ENV
            echo "VITE_REDIRECT_URI=https://dev.gikview.org/" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        working-directory: web/frontend
        run: npm ci

      - name: Build
        working-directory: web/frontend
        env:
          VITE_WS_URL: ${{ env.VITE_WS_URL }}
          VITE_CLIENT_ID: ${{ env.VITE_CLIENT_ID }}
          VITE_REDIRECT_URI: ${{ env.VITE_REDIRECT_URI }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync web/frontend/dist/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        if: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"