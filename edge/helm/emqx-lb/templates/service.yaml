apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emqx-lb.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: emqx
  ports:
    - name: mqtt
      port: {{ .Values.service.ports.mqtt }}
      targetPort: mqtt
      protocol: TCP
    - name: mqtts
      port: {{ .Values.service.ports.mqtts }}
      targetPort: mqtts
      protocol: TCP
