emqx:
  brokerUrl: "ssl://emqx.gikview.svc.cluster.local:8883"

influxdb:
  url: "http://influxdb.gikview.svc.cluster.local:8181"

dynamodb:
  # Prod writes prod-only by default. Add gikview-rooms to also mirror into
  # the dev table when load allows.
  tables:
    - gikview-rooms-prod
    - gikview-rooms-dev

iamRolesAnywhere:
  trustAnchorArn: "arn:aws:rolesanywhere:ap-northeast-2:585192672325:trust-anchor/d2af7275-4f15-40f3-979f-65976d80ccbb"
  profileArn: "arn:aws:rolesanywhere:ap-northeast-2:585192672325:profile/157c7e0a-deaa-43a3-814f-6422530719c3"
  roleArn: "arn:aws:iam::585192672325:role/gikview-edgegw"
  region: ap-northeast-2

domainSuffix: cluster.local

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
