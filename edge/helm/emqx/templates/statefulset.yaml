apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "emqx.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Chart.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "emqx.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "emqx.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "emqx.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: emqx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: mqtt
              containerPort: {{ .Values.service.ports.mqtt }}
              protocol: TCP
            - name: mqtts
              containerPort: {{ .Values.service.ports.mqtts }}
              protocol: TCP
            - name: dashboard
              containerPort: {{ .Values.service.ports.dashboard }}
              protocol: TCP
            - name: ekka
              containerPort: {{ .Values.service.ports.ekka }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- range $key, $val := .Values.emqxConfig }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
            - name: emqx-log
              mountPath: /opt/emqx/log
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: emqx-data
          emptyDir: {}
        - name: emqx-log
          emptyDir: {}
        - name: tmp
          emptyDir: {}
