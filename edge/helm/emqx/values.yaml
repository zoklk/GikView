replicaCount: 2

image:
  repository: emqx/emqx
  tag: "5.8.6"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    mqtts: 8883
    dashboard: 18083
    ekka: 4370

nodePortService:
  nodePorts:
    mqtts: 31884

tls:
  secretName: emqx-server-tls
  mountPath: /etc/emqx/tls

acl:
  configMapName: emqx-acl
  mountPath: /etc/emqx/acl

certificate:
  issuerName: step-cluster-issuer
  duration: 2160h
  renewBefore: 720h
  # k8s cluster DNS suffix — Telegraf/Edge-GW 가 ClusterIP svc FQDN 으로 접속할
  # 때 검증할 SAN 이 환경별로 다름. dev override 는 values-dev.yaml.
  clusterDomain: cluster.local
  ipAddresses: []

emqxConfig:
  EMQX_CLUSTER__DISCOVERY_STRATEGY: "dns"
  EMQX_CLUSTER__DNS__RECORD_TYPE: "srv"
  EMQX_LISTENERS__TCP__DEFAULT__ENABLED: "false"
  EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
  EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: "/etc/emqx/tls/tls.crt"
  EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: "/etc/emqx/tls/tls.key"
  EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: "/etc/emqx/tls/ca.crt"
  EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: "verify_peer"
  EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "true"
  EMQX_MQTT__PEER_CERT_AS_USERNAME: "cn"
  EMQX_AUTHORIZATION__NO_MATCH: "deny"
  EMQX_AUTHORIZATION__SOURCES: '[{type = file, enable = true, path = "/etc/emqx/acl/acl.conf"}]'
  # Dashboard / management HTTP API: bind to pod loopback only. Service still advertises
  # port 18083 so `kubectl port-forward svc/emqx :18083` keeps working (kubelet enters the
  # pod's netns and connects to localhost), but in-cluster traffic via the Service/NodePort
  # path lands on pod eth0:18083 → not listening → TCP RST. Combined with the readiness
  # probe being tcpSocket on mqtts (kubelet probes pod IP, no longer needs dashboard:18083),
  # the dashboard surface is reachable only by callers who already hold pods/portforward or
  # pods/exec on this Pod (== anyone who can read every Secret here anyway).
  EMQX_DASHBOARD__LISTENERS__HTTP__BIND: "127.0.0.1:18083"

resources:
  requests:
    cpu: "200m"
    memory: "384Mi"
  limits:
    cpu: "500m"
    memory: "384Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
