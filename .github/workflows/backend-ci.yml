name: Backend CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'web/backend/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'web/backend/**'

env:
  TRIVY_VERSION: '0.71.0'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 전체 git history 스캔

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Backend Lint & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install tools
        run: |
          pip install \
            ruff \
            mypy \
            boto3-stubs[dynamodb,apigatewaymanagementapi]
          # 실제 PyJWT(py.typed 내장) 설치. types-PyJWT 스텁은 stale 라
          # PyJWKClient 누락 → 사용 안 함.
          pip install -r web/backend/requirements.txt

      - name: Ruff lint
        run: ruff check web/backend/

      - name: Ruff format check
        run: ruff format --check web/backend/

      - name: mypy
        run: mypy web/backend/ --ignore-missing-imports

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Trivy (dependencies)
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            web/backend/
