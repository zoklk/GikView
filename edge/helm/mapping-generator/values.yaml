image:
  repository: ghcr.io/zoklk/mapping-generator
  tag: edge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: ""

schedule: "*/15 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
startingDeadlineSeconds: 120
backoffLimit: 4

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}

# device_id -> room_id. room_id convention: room-{a|b}-{floor}-{idx}.
deviceRoomMapping: {}
