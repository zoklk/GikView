# Operator pre-creates these Secrets off-band (see context/knowledge/step-ca.md):
#   step-ca-certs, step-ca-secrets, step-ca-ca-password, step-ca-admin-jwk,
#   step-issuer-provisioner-password
# And chowns the host PV dir 1000:1000.

step-certificates:
  nodeSelector:
    kubernetes.io/hostname: e-s1
  ca:
    db:
      size: 2Gi

nodePort:
  number: 31900

persistence:
  storageClassName: local-storage
  pvName: step-ca-pv-prod
  hostPath: /mnt/ssd/step-ca
  nodeHostname: e-s1

caJson:
  # yamllint disable-line rule:line-length
  deviceBootstrapRoots: ""
  # yamllint disable-line rule:line-length
  deviceRenewalRoots: ""
  adminJwk:
    key:
      use: sig
      kty: EC
      crv: P-256
      alg: ES256
      kid: "KfRD3GwGt3pwdN0DyZI2q-JWt5i_IpgDOnt-D0-lLIE"
      x: "VAueV_FMjCL6Ngxgh61KF9p9at6CGuO5NONSe5EqG80"
      "y": "91LcrOGCovukkuSTbSsQ9Q8E5vGJCHdv0jUw6IKD868"   # quoted: go-yaml parses bare y as bool
    encryptedKey: ""   # loaded from step-ca-admin-jwk Secret at boot
