apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.rules.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
data:
  gikview-visibility.yaml: |
    groups:
      - name: gikview-visibility
        rules:
          - alert: SensorNoData
            expr: time() - gikview_sensor_last_seen_seconds > 600
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "room {{`{{ $labels.room_id }}`}} 10분+ 무데이터"

          - alert: CertExpirySoon
            expr: (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 7
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "cert {{`{{ $labels.name }}`}} 7일 내 만료"

          - alert: EdgeGatewayAWSFailure
            expr: increase(edge_gateway_dynamodb_putitem_failures_total[10m]) > 0 or increase(edge_gateway_sts_refresh_failures_total[10m]) > 0
            labels:
              severity: critical
            annotations:
              summary: "edge-gateway AWS(STS/DynamoDB) 실패 — DynamoDB stale 위험"

          - alert: InfluxDiskHigh
            expr: (1 - node_filesystem_avail_bytes{mountpoint=~"/mnt/ssd.*"} / node_filesystem_size_bytes) > 0.85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "InfluxDB SSD 사용률 85%+ ({{`{{ $labels.mountpoint }}`}})"

          - alert: EtcdFsyncSlow
            expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "etcd WAL fsync p99 > 0.5s (260420 cascading-failure 재발 징후)"

          - alert: NodeDown
            expr: up{job="node-exporter"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "node {{`{{ $labels.instance }}`}} node-exporter 스크랩 불가"

          - alert: EMQXACLDenySpike
            expr: increase(emqx_acl_deny_count[10m]) > 0
            labels:
              severity: warning
            annotations:
              summary: "EMQX ACL deny 발생 — 위조/부트스트랩 연결 시도 의심"
