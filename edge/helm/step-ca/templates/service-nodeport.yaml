{{- /*
NodePort exposure for ESP8266 devices on the school LAN: <router>:<extPort> -> <security node>:<nodePort>
-> step-ca :9000. externalTrafficPolicy: Local so step-ca sees each device's real source IP in logs/policy.
Mirrors edge/helm/emqx/templates/service-nodeport.yaml. The in-cluster ClusterIP Service (step-ca:9000,
from the subchart) is what step-issuer/cert-manager use; this one is device-facing only.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: step-ca-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "step-ca.labels" . | nindent 4 }}
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    {{- include "step-ca.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 9000
      targetPort: 9000
      nodePort: {{ .Values.nodePort.number }}
      protocol: TCP
