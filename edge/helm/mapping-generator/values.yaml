# mapping-generator — turns the device-room-mapping ConfigMap (the single
# source of truth, managed via git in .Values.deviceRoomMapping) into three
# derived ConfigMaps consumed downstream:
#   emqx-acl          — EMQX file authorizer rules
#   step-ca-whitelist — JSON array of allowed device CNs (step-ca initContainer merges it)
#   telegraf-lookup   — device_id,room_id CSV (Telegraf lookup processor)
# A one-shot init Job seeds them on install/upgrade; a CronJob re-derives them
# every 15 min so device additions propagate without a redeploy.

image:
  # Self-built. Keep in sync with config/harness.yaml: conventions.registry +
  # conventions.image_tag — the harness builds/pushes <registry>/<service>:<tag>.
  repository: ghcr.io/zoklk/mapping-generator
  tag: edge
  # `edge` is a mutable tag — Always so nodes don't keep a stale cached copy
  # after a rebuild/push.
  pullPolicy: Always

# GHCR package is kept private; the imagePullSecret is a one-time per-env human
# task — see context/phases/security.md → mapping-generator "이미지 레지스트리
# 사전 작업" (kubectl create secret docker-registry ghcr-pull --docker-server=ghcr.io ...).
imagePullSecrets:
  - name: ghcr-pull

serviceAccount:
  name: ""   # defaults to the chart name

# CronJob cadence — device additions are rare, 15 min is plenty.
schedule: "*/15 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
startingDeadlineSeconds: 120
# Retries for a single Job run (the init Job and each CronJob run).
backoffLimit: 4

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# nodeSelector lives in values-<env>.yaml (node_category: security).
nodeSelector: {}

# Single source of truth: device_id -> room_id, edited via git.
# room_id convention: room-{building a|b}-{floor}-{room idx} (e.g. room-a-3-2).
# The smoke entry device-aaaaaa -> room-a-9-9 is an intentionally non-existent
# slot; add real devices as new lines in values-dev.yaml / values-prod.yaml.
deviceRoomMapping: {}
