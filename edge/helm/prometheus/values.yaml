replicaCount: 1

image:
  repository: prom/prometheus
  tag: "v3.12.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

serviceAccountName: prometheus

config:
  configMapName: prometheus-config
  mountPath: /etc/prometheus

# InfluxDB /metrics scrape 용 admin token. monitoring NS 사전 생성(telegraf-freshness 와 공용).
influxdbTokenSecret:
  name: influxdb-admin-token
  mountPath: /etc/prometheus/secrets/influxdb
rules:
  configMapName: prometheus-rules
  mountPath: /etc/prometheus/rules

# microSD random-write IOPS 보호(storage.md 결정 2, 260420 cascading-failure). 장기 시계열은 InfluxDB.
retention: 14d
scrapeInterval: 30s

# etcd 메트릭 타겟. 운영자가 e-s1 K3s 에서 etcd-expose-metrics 선행 후 내부 IP:2381 주입.
# 비우면 etcd job 미생성(나머지 스크랩엔 영향 없음). prometheus.md "etcd 메트릭 선행 설정".
etcd:
  target: ""

# Hubble(Cilium) 네트워크 메트릭 스크랩 토글 (결정 9). 선행: cilium hubble.metrics.enabled (양 클러스터).
# false 면 hubble job 미생성 — cilium metrics 미적용 환경에서 smoke 통과용. context/knowledge/hubble.md.
hubble:
  enabled: true

persistence:
  storageClassName: local-storage
  pvName: prometheus-pv
  size: 8Gi
  hostPath: /var/lib/prometheus
  nodeHostname: ""

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
