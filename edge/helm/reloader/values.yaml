reloader:
  reloader:
    watchGlobally: true
    reloadOnCreate: true
    reloadStrategy: annotations
    readOnlyRootFileSystem: true
    deployment:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      # Subchart default containerSecurityContext is {}, tripping trivy KSV checks.
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
