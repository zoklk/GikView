name: Edge Component Static Analysis
on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'edge/**'

env:
  TRIVY_VERSION: '0.71.0'

jobs:
  edge-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hadolint
        id: s1
        continue-on-error: true
        run: |
          if find edge/ -name 'Dockerfile' | grep -q .; then
            docker run --rm -i \
              -v "$PWD:/workspace" \
              -w /workspace \
              hadolint/hadolint \
              hadolint $(find edge/ -name 'Dockerfile' | tr '\n' ' ')
          else
            echo "No Dockerfile found, skipping."
          fi

      - name: YAML Lint
        id: s2
        continue-on-error: true
        run: |
          pip install yamllint -q
          yamllint -d '{extends: default, rules: {document-start: disable, line-length: {max: 300}}, ignore: "edge/helm/*/templates/\n**/*.gotmpl\n**/crds/**"}' edge/

      - name: Install Trivy
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo install -m 755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Trivy
        id: s3
        continue-on-error: true
        run: |
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --no-progress \
            --format table \
            edge/

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.4
        id: s4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.21.0'

      - name: Set up Kubeconform
        uses: bmuschko/setup-kubeconform@v1
        id: s5
        continue-on-error: true

      - name: Validate manifests
        id: s6
        continue-on-error: true
        run: |
          for chart in edge/helm/*/; do
            echo "Validating: $chart"
            helm template "$chart" | kubeconform -summary -verbose -ignore-missing-schemas -
          done

      - name: Final Validation
        if: always()
        run: |
          STATUS_S1="${{ steps.s1.outcome }}"
          STATUS_S2="${{ steps.s2.outcome }}"
          STATUS_S3="${{ steps.s3.outcome }}"
          STATUS_S4="${{ steps.s4.outcome }}"
          STATUS_S5="${{ steps.s5.outcome }}"
          STATUS_S6="${{ steps.s6.outcome }}"
          echo "Analysis Results:"
          echo "s1 (Hadolint): $STATUS_S1"
          echo "s2 (YAML Lint): $STATUS_S2"
          echo "s3 (Trivy): $STATUS_S3"
          echo "s4 (Gitleaks): $STATUS_S4"
          echo "s5 (Kubeconform setup): $STATUS_S5"
          echo "s6 (Validate manifests): $STATUS_S6"
          if [[ "$STATUS_S1" != "success" ]] || \
             [[ "$STATUS_S2" != "success" ]] || \
             [[ "$STATUS_S3" != "success" ]] || \
             [[ "$STATUS_S4" != "success" ]] || \
             [[ "$STATUS_S5" != "success" ]] || \
             [[ "$STATUS_S6" != "success" ]]; then
            echo "Error: One or more static analysis steps failed."
            exit 1
          fi
