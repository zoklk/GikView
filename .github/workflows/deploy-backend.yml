# .github/workflows/deploy-backend.yml
name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'web/backend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web/backend/Dockerfile

      - name: Python lint
        uses: chartboost/ruff-action@v1
        with:
          src: web/backend

      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: ./web/backend
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPO }}:$IMAGE_TAG \
            ./web/backend

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPO }}:$IMAGE_TAG

      - name: Update Lambda
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ secrets.ECR_REPO }}:$IMAGE_TAG
          aws lambda update-function-code \
            --function-name gikview-auth \
            --image-uri $IMAGE_URI
          aws lambda update-function-code \
            --function-name gikview-api \
            --image-uri $IMAGE_URI