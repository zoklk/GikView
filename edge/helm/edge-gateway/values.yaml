replicaCount: 2

image:
  repository: ghcr.io/zoklk/edge-gateway
  tag: edge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull

certificate:
  issuerName: step-cluster-issuer
  commonName: edge-gateway
  duration: 2160h
  renewBefore: 720h

tls:
  secretName: edge-gateway-tls
  mountPath: /tls

mapping:
  configMapName: device-room-mapping
  mountPath: /mapping

# /metrics 노출 포트(prometheus 스크랩: edge-gateway.svc:9101). ClusterIP 내부 전용.
service:
  port: 9101

emqx:
  brokerUrl: ""
  shareTopic: "$share/edge-gw/sensors/+/occupancy"

influxdb:
  url: ""
  bucket: gikview

# dynamodb.tables is env-specific (fan-out targets) — defined only in
# values-<env>.yaml, not here. Lists replace (not merge) across value files.

iamRolesAnywhere:
  trustAnchorArn: ""
  profileArn: ""
  roleArn: ""
  region: ap-northeast-2

influxdbTokenSecret:
  name: influxdb-admin-token
  key: token

domainSuffix: cluster.local

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
