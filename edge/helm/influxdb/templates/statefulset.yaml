apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Chart.Name }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "influxdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "influxdb.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: influxdb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - "serve"
            - "--node-id=$(POD_NAME)"
            - "--object-store=file"
            - "--data-dir=/var/lib/influxdb3/data"
            - "--http-bind=0.0.0.0:{{ .Values.service.ports.http }}"
            - "--admin-token-file=/var/run/secrets/influxdb/admin-token.json"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # InfluxDB 3 Core 3.9.x requires a bearer token on every HTTP
          # endpoint once an admin token is provisioned, including /ping
          # and /health (influxdata/influxdb#26662). kubelet httpGet probes
          # can't attach an Authorization header, so we use a TCP probe —
          # it confirms the listener is bound on the http port, which is
          # the readiness signal we need.
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: admin-token
              mountPath: /var/run/secrets/influxdb
              readOnly: true
            - name: influxdb-data
              mountPath: /var/lib/influxdb3/data
            - name: tmp
              mountPath: /tmp
            # influxdb:3-core image bakes ENV INFLUXDB3_PLUGIN_DIR=/plugins; Processing
            # Engine boots unconditionally and writes /plugins/.venv, which fails under
            # readOnlyRootFilesystem=true. Provide a writable emptyDir until upstream
            # ships a flag to disable the engine (influxdata/influxdb#26345).
            - name: plugins
              mountPath: /plugins
      volumes:
        - name: admin-token
          secret:
            secretName: {{ .Values.adminTokenSecret.name }}
            items:
              - key: {{ .Values.adminTokenSecret.fileKey }}
                path: admin-token.json
        - name: tmp
          emptyDir: {}
        - name: plugins
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: influxdb-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
