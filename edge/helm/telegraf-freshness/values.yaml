replicaCount: 1

image:
  repository: telegraf
  tag: "1.38-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9273

config:
  configMapName: telegraf-freshness-config
  mountPath: /etc/telegraf
  queryInterval: "30s"
  # InfluxDB 3 Core 파일 한도(432) 회피용 스캔 윈도. 이 기간보다 오래 조용한 방은 last_seen
  # 시리즈에서 사라짐 — 부재 감지는 gikview_room_expected(lookup CSV) 와의 rule join 이 담당.
  freshnessWindow: "6 hours"

# mapping-generator가 이 NS로 복제하는 device→room CSV. SoT 기대 방 목록 소스.
lookup:
  configMapName: telegraf-lookup
  mountPath: /lookup
  sourceKey: lookup.csv

influxdb:
  url: ""
  database: gikview

influxdbTokenSecret:
  name: influxdb-admin-token
  key: token

resources:
  requests:
    cpu: "20m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
